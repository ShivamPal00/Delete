<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lost & Found Portal delete</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --primary:#2193b0;
  --secondary:#6dd5ed;
  --card-bg:rgba(255,255,255,0.1);
  --text:#fff;
}
body.dark{
  --primary:#111;
  --secondary:#222;
  --card-bg:#333;
  --text:#eee;
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:var(--text);
  min-height:100vh;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
  text-align:center;
}

h1{margin-top:10px;}

.btn{
  padding:10px 18px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#ffffff30;
  color:var(--text);
}
.btn:hover{background:#ffffff60;}

.card{
  background:var(--card-bg);
  padding:15px;
  margin:15px auto;
  border-radius:10px;
  max-width:650px;
  text-align:left;
  border:1px solid rgba(255,255,255,0.3);
}

.card img{
  width:120px;
  float:left;
  margin-right:10px;
  border-radius:8px;
}

input,select,textarea{
  width:90%;
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.dashboard{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:15px 0;
}

.count-box{
  background:var(--card-bg);
  padding:10px 20px;
  border-radius:8px;
}

.priority{
  color:yellow;
  font-weight:bold;
}

footer{
  text-align:center;
  padding:10px;
  margin-top:20px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="top-bar">
<h1>🎒 Lost & Found Portal v2</h1>
<button class="btn" onclick="toggleTheme()">🌙 Toggle Theme</button>
</div>

<div class="dashboard">
<div class="count-box">Lost: <span id="lostCount">0</span></div>
<div class="count-box">Found: <span id="foundCount">0</span></div>
<div class="count-box">Success: <span id="successCount">0</span></div>
</div>

<input type="text" id="searchInput" placeholder="🔍 Search items..." onkeyup="searchItems()">

<br>
<button class="btn" onclick="showForm('lost')">I Lost Item</button>
<button class="btn" onclick="showForm('found')">I Found Item</button>
<button class="btn" onclick="showItems()">View All Items</button>

<div id="formSection" style="display:none;">
<h2 id="formTitle"></h2>

<form id="itemForm">
<input type="text" id="name" placeholder="Your Name" required><br>
<input type="text" id="phone" placeholder="Phone (10 digits)" required><br>

<select id="category" required>
<option value="">Select Category</option>
<option>Mobile</option>
<option>Wallet</option>
<option>Bag</option>
<option>Documents</option>
<option>Other</option>
</select><br>

<input type="text" id="title" placeholder="Item Title" required><br>
<textarea id="description" placeholder="Description" required></textarea><br>
<input type="file" id="image" required><br>

<label><input type="checkbox" id="priority"> High Priority</label><br>

<button type="submit" class="btn">Submit</button>
<button type="button" class="btn" onclick="cancelForm()">Cancel</button>
</form>
</div>

<div id="itemsList"></div>

<footer>
© 2026 Lost & Found Portal v2
</footer>

</div>

<script>

let currentType="";
const STORAGE_KEY="lostFoundV2";
const SUCCESS_KEY="successV2";

function toggleTheme(){
  document.body.classList.toggle("dark");
}

function showForm(type){
  currentType=type;
  document.getElementById("formSection").style.display="block";
  document.getElementById("formTitle").innerText=
  type==="lost"?"Report Lost Item":"Report Found Item";
}

function cancelForm(){
  document.getElementById("formSection").style.display="none";
}

document.getElementById("itemForm").addEventListener("submit",function(e){
e.preventDefault();

const reader=new FileReader();
reader.onload=function(){

let items=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];

items.push({
id:Date.now(),
type:currentType,
name:name.value,
phone:phone.value,
category:category.value,
title:title.value,
description:description.value,
image:reader.result,
priority:priority.checked,
date:new Date().toLocaleString(),
claimed:false
});

localStorage.setItem(STORAGE_KEY,JSON.stringify(items));
alert("Item Submitted!");
cancelForm();
updateDashboard();
};

reader.readAsDataURL(image.files[0]);
});

function showItems(){
const list=document.getElementById("itemsList");
list.innerHTML="";
let items=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];

items.forEach(item=>{
if(item.claimed) return;

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${item.image}">
<h3>${item.title} ${item.priority?'<span class="priority">⚠ Priority</span>':''}</h3>
<p><b>Type:</b> ${item.type}</p>
<p><b>Category:</b> ${item.category}</p>
<p>${item.description}</p>
<p><small>${item.date}</small></p>
<button class="btn" onclick="markSuccess(${item.id})">Mark as Matched</button>
`;

list.appendChild(card);
});
updateDashboard();
}

function markSuccess(id){
let items=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
let success=JSON.parse(localStorage.getItem(SUCCESS_KEY))||[];

let item=items.find(i=>i.id===id);
if(item){
item.claimed=true;
success.push(item);
}

localStorage.setItem(STORAGE_KEY,JSON.stringify(items));
localStorage.setItem(SUCCESS_KEY,JSON.stringify(success));
showItems();
updateDashboard();
}

function searchItems(){
let input=document.getElementById("searchInput").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
card.style.display=
card.innerText.toLowerCase().includes(input)?"block":"none";
});
}

function updateDashboard(){
let items=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
let success=JSON.parse(localStorage.getItem(SUCCESS_KEY))||[];

document.getElementById("lostCount").innerText=
items.filter(i=>i.type==="lost"&&!i.claimed).length;

document.getElementById("foundCount").innerText=
items.filter(i=>i.type==="found"&&!i.claimed).length;

document.getElementById("successCount").innerText=
success.length;
}

updateDashboard();

</script>
</body>
</html>
